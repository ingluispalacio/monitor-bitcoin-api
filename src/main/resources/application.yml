application:
  request:
    mappings: /api/v1
  cors:
    allowedorigins: http://localhost:4200
server:
  port: 7077
services:
  coingecko:
    base-url: https://api.coingecko.com/api/v3/
jwt:
  secret: mySuperSecretKeyForJwtCryptoMonitor123456ABCDEF123456
  expiration: 3600000 # 1 hora en milisegundos
spring:
  r2dbc:
    url: r2dbc:sqlserver://localhost:56244/crypto_db?encrypt=false
    username: sa
    password: 123456

  liquibase:
    enabled: true
    change-log: classpath:db/db.changelog-master.yaml
    url: jdbc:sqlserver://localhost:56244;databaseName=crypto_db;encrypt=false;trustServerCertificate=true
    user: sa
    password: 123456
logging:
  file:
    name: ./logs/crypto-monitor.log
    path: ./logs
  level:
    com.micro.service.crypto_monitor: DEBUG
    org.springframework.web.reactive.socket: TRACE
    org.springframework.security: DEBUG
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10